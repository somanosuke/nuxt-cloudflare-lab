name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # パッケージマネージャ: pnpm 前提（npm なら action-setup を削除し cache/コマンドを変更）
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Nuxt を Cloudflare 向けにビルド（nuxt.config.ts で nitro.preset: 'cloudflare_module'）
      - name: Build
        run: pnpm build

      # Worker 名 = リポジトリ名
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ github.event.repository.name }}